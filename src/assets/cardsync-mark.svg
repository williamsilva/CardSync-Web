<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128" role="img" aria-label="CardSync">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="0.55" stop-color="#0ea5e9"/>
      <stop offset="1" stop-color="#0284c7"/>
    </linearGradient>
    <filter id="s" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#0b1220" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect x="10" y="10" width="108" height="108" rx="28" fill="url(#g)" filter="url(#s)"/>

  <!-- subtle sync arcs -->
  <path d="M39 44c7-8 17-13 29-13 10 0 20 3 27 9" fill="none" stroke="#e0f2fe" stroke-opacity="0.85" stroke-width="7" stroke-linecap="round"/>
  <path d="M89 84c-7 8-17 13-29 13-10 0-20-3-27-9" fill="none" stroke="#e0f2fe" stroke-opacity="0.55" stroke-width="7" stroke-linecap="round"/>

  <!-- CS monogram -->
  <text x="64" y="78" text-anchor="middle" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="44" font-weight="800" fill="#ffffff">CS</text>
</svg>

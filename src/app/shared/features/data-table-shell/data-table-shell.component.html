<p-card styleClass="surface-card border-1 border-700">
  <ng-template pTemplate="title">
    <div class="flex align-items-start justify-content-between gap-2">
      <div>
        <div class="text-xl font-semibold">{{ title }}</div>
        <div class="text-500 text-sm" *ngIf="subtitle">{{ subtitle }}</div>
      </div>

      <div class="flex align-items-center gap-2">
        <ng-content select="[csCardActions]"></ng-content>
      </div>
    </div>
  </ng-template>

  <ng-template pTemplate="content">
    <ng-content></ng-content>
  </ng-template>
</p-card>

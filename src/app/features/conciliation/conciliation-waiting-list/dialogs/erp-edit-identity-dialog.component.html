<p-dialog
  [modal]="true"
  position="top"
  appendTo="body"
  [closable]="false"
  [draggable]="false"
  [resizable]="false"
  [baseZIndex]="1100"
  [visible]="visible"
  [showHeader]="false"
  (onHide)="closeDialog.emit()"
  [dismissableMask]="!resolving"
  (visibleChange)="onVisibleChange($event)"
  [contentStyle]="{ padding: '1.5rem 1.75rem 1.75rem' }"
  [style]="{ width: 'min(480px, 94vw)', marginTop: '5rem' }"
>
  <div class="flex flex-column gap-4">
    <div class="flex align-items-center gap-2 text-lg text-color">
      <i class="pi pi-pencil"></i>
      <span>{{ 'conciliation.missingAcq.editIdentity.title' | translate }}</span>
    </div>

    <div class="flex flex-column gap-3">
      <p-floatlabel>
        <p-inputnumber
          inputId="editNsu"
          [(ngModel)]="nsu"
          [useGrouping]="false"
          [allowEmpty]="true"
          [maxFractionDigits]="0"
          [style]="{ width: '100%' }"
        ></p-inputnumber>
        <label for="editNsu">{{ 'conciliation.missingAcq.editIdentity.nsu' | translate }}</label>
      </p-floatlabel>

      <p-floatlabel>
        <input
          pInputText
          id="editAuthorization"
          [(ngModel)]="authorization"
          class="w-full"
        />
        <label for="editAuthorization">
          {{ 'conciliation.missingAcq.editIdentity.authorization' | translate }}
        </label>
      </p-floatlabel>
    </div>
  </div>

  <ng-template pTemplate="footer">
    <button
      pButton
      type="button"
      icon="pi pi-times"
      [disabled]="resolving"
      (click)="closeDialog.emit()"
      class="p-button-text p-button-sm"
      [label]="'common.cancel' | translate"
    ></button>

    <button
      pButton
      type="button"
      icon="pi pi-save"
      [loading]="resolving"
      (click)="onConfirmClick()"
      class="p-button-success"
      [label]="'common.save' | translate"
    ></button>
  </ng-template>
</p-dialog>

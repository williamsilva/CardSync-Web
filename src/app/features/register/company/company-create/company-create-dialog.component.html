<p-dialog
  [modal]="true"
  appendTo="body"
  [closable]="false"
  (onHide)="onHide()"
  [draggable]="false"
  [resizable]="false"
  [visible]="visible()"
  [contentStyle]="{ overflow: 'visible' }"
  [style]="{ width: '720px', maxWidth: '95vw' }"
  [header]="company()?.id ? ('company.edit.title' | translate) : ('company.new.title' | translate)"
  >
  <form [formGroup]="form" class="cs-dialog-form">
    <div class="grid formgrid gap-0">
      <div class="col-12 md:col-6 p-2">
        <p-floatLabel variant="on" class="w-full">
          <input
            pInputText
            type="text"
            id="fantasyName"
            formControlName="fantasyName"
            class="w-full p-inputtext-sm"
            />
            <app-error-msg
              [field]="'fantasyName'"
              [forId]="'fantasyName'"
              [showTechnicalDetails]="true"
              [control]="form.controls.fantasyName"
              [label]="'company.fields.fantasyName' | translate"
              />
            </p-floatLabel>
          </div>

          <div class="col-12 md:col-6 p-2">
            <p-floatLabel variant="on" class="w-full">
              <input
                pInputText
                type="text"
                id="socialReason"
                class="w-full p-inputtext-sm"
                formControlName="socialReason"
                />
                <app-error-msg
                  [field]="'socialReason'"
                  [forId]="'socialReason'"
                  [showTechnicalDetails]="false"
                  [control]="form.controls.socialReason"
                  [label]="'company.fields.socialReason' | translate"
                  />
                </p-floatLabel>
              </div>
            </div>

            <div class="grid formgrid gap-0">
              <div class="col-12 md:col-5 p-2">
                <p-floatLabel variant="on" class="w-full">
                  <input
                    id="cnpj"
                    pInputText
                    type="text"
                    csCpfCnpjMask
                    autocomplete="off"
                    inputmode="numeric"
                    formControlName="cnpj"
                    class="w-full p-inputtext-sm"
                    />
                    <app-error-msg
                      [field]="'cnpj'"
                      [forId]="'cnpj'"
                      [control]="form.controls.cnpj"
                      [label]="'company.fields.cnpj' | translate"
                      />
                    </p-floatLabel>
                  </div>

                  <div class="col-12 md:col-4 p-2">
                    <p-floatLabel variant="on" class="w-full">
                      <p-select
                        size="small"
                        inputId="type"
                        class="w-full"
                        appendTo="body"
                        [filter]="false"
                        [showClear]="true"
                        optionValue="value"
                        optionLabel="label"
                        formControlName="type"
                        [options]="typeOptions()"
            [invalid]="
              form.controls.type.invalid && (form.controls.type.dirty || form.controls.type.touched)
            "
                      ></p-select>

                      <app-error-msg
                        [field]="'type'"
                        [forId]="'type'"
                        [control]="form.controls.type"
                        [label]="'company.fields.typeCompanyEnum' | translate"
                        />
                      </p-floatLabel>
                    </div>

                    @if (isEdit()) {
                      <div class="col-12 md:col-3 p-2">
                        <p-floatLabel variant="on" class="w-full">
                          <p-select
                            size="small"
                            class="w-full"
                            appendTo="body"
                            inputId="status"
                            [filter]="false"
                            [showClear]="true"
                            optionValue="value"
                            optionLabel="label"
                            formControlName="status"
                            [options]="statusOptions()"
                          ></p-select>
                          <app-error-msg
                            [field]="'status'"
                            [forId]="'status'"
                            [required]="false"
                            [control]="form.controls.status"
                            [label]="'company.fields.statusEnum' | translate"
                            />
                          </p-floatLabel>
                        </div>
                      }
                    </div>
                  </form>

                  <ng-template pTemplate="footer">
                    <button
                      pButton
                      type="button"
                      (click)="close()"
                      icon="pi pi-times"
                      class="p-button-text p-button-sm"
                      [label]="'common.cancel' | translate"
                      [disabled]="saving() || loadingCompany()"
                    ></button>

                    <button
                      pButton
                      type="button"
                      (click)="save()"
                      icon="pi pi-save"
                      class="p-button-sm"
                      [loading]="saving()"
                      [label]="'common.save' | translate"
                      [disabled]="saving() || loadingCompany()"
                    ></button>
                  </ng-template>
                </p-dialog>

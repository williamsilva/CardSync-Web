<p-dialog
  [modal]="true"
  [closable]="false"
  (onHide)="onHide()"
  [draggable]="false"
  [resizable]="false"
  [visible]="visible()"
  [contentStyle]="{ overflow: 'visible' }"
  [style]="{ width: '600px', maxWidth: '95vw' }"
  [header]="bank()?.id ? ('bank.edit.title' | translate) : ('bank.new.title' | translate)"
>
  <form [formGroup]="form" class="cs-dialog-form">
    <div class="grid formgrid gap-0">
      <div class="col-12 md:col-3 p-2">
        <p-floatLabel variant="on" class="w-full">
          <input
            pInputText
            type="text"
            id="code"
            formControlName="code"
            class="w-full p-inputtext-sm"
          />
          <app-error-msg
            [field]="'code'"
            [forId]="'code'"
            [control]="form.controls.code"
            [label]="'bank.fields.code' | translate"
          />
        </p-floatLabel>
      </div>

      <div class="col-12 md:col-9 p-2">
        <p-floatLabel variant="on" class="w-full">
          <input
            pInputText
            type="text"
            id="name"
            formControlName="name"
            class="w-full p-inputtext-sm"
          />
          <app-error-msg
            [field]="'name'"
            [forId]="'name'"
            [control]="form.controls.name"
            [label]="'bank.fields.name' | translate"
          />
        </p-floatLabel>
      </div>

      @if (isEdit()) {
        <div class="col-12 md:col-4 p-2">
          <p-floatLabel variant="on" class="w-full">
            <p-select
              size="small"
              class="w-full"
              appendTo="body"
              inputId="status"
              [filter]="false"
              [showClear]="true"
              optionValue="value"
              optionLabel="label"
              formControlName="status"
              [options]="statusOptions()"
            ></p-select>
            <app-error-msg
              [field]="'status'"
              [forId]="'status'"
              [required]="false"
              [control]="form.controls.status"
              [label]="'bank.fields.statusEnum' | translate"
            />
          </p-floatLabel>
        </div>
      }
    </div>
  </form>

  <ng-template pTemplate="footer">
    <button
      pButton
      type="button"
      (click)="close()"
      icon="pi pi-times"
      class="p-button-text p-button-sm"
      [label]="'common.cancel' | translate"
      [disabled]="saving()"
    ></button>
    <button
      pButton
      type="button"
      (click)="save()"
      icon="pi pi-save"
      class="p-button-sm"
      [loading]="saving()"
      [label]="'common.save' | translate"
      [disabled]="saving()"
    ></button>
  </ng-template>
</p-dialog>

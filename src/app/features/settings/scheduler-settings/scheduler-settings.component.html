<cs-page-header
  [subtitle]="'conciliation.settings.schedulingSubtitle' | translate"
  [breadcrumb]="[
    { label: ('menu.settings.title' | translate), url: '/settings' },
    { label: ('routes.settings.scheduler.title' | translate) },
  ]"
></cs-page-header>

<p-card class="mt-2 block">
  <form [formGroup]="form" (ngSubmit)="save()">
    <div class="grid formgrid gap-0">
      <div class="col-12 md:col-3 p-2">
        <div class="flex align-items-center justify-content-between border-1 surface-border border-round p-3 h-full gap-3">
          <label for="enabled" class="text-sm flex-1">
            {{ 'conciliation.settings.schedulerEnabled' | translate }}
            <i
              class="pi pi-info-circle text-xs ml-1 text-color-secondary cursor-pointer"
              style="pointer-events: auto"
              [pTooltip]="'conciliation.settings.schedulerEnabledHint' | translate"
              tooltipPosition="top"
            ></i>
          </label>
          <p-toggleswitch formControlName="enabled" inputId="enabled"></p-toggleswitch>
        </div>
      </div>

      <div class="col-12 md:col-3 p-2">
        <div class="flex align-items-center justify-content-between border-1 surface-border border-round p-3 h-full gap-3">
          <label for="completePipelineEnabled" class="text-sm flex-1">
            {{ 'conciliation.settings.completePipelineEnabled' | translate }}
            <i
              class="pi pi-info-circle text-xs ml-1 text-color-secondary cursor-pointer"
              style="pointer-events: auto"
              [pTooltip]="'conciliation.settings.completePipelineEnabledHint' | translate"
              tooltipPosition="top"
            ></i>
          </label>
          <p-toggleswitch formControlName="completePipelineEnabled" inputId="completePipelineEnabled"></p-toggleswitch>
        </div>
      </div>

      <div class="col-12 md:col-3 p-2">
        <div class="flex align-items-center justify-content-between border-1 surface-border border-round p-3 h-full gap-3">
          <label for="completePipelineStopOnStepError" class="text-sm flex-1">
            {{ 'conciliation.settings.completePipelineStopOnStepError' | translate }}
            <i
              class="pi pi-info-circle text-xs ml-1 text-color-secondary cursor-pointer"
              style="pointer-events: auto"
              [pTooltip]="'conciliation.settings.completePipelineStopOnStepErrorHint' | translate"
              tooltipPosition="top"
            ></i>
          </label>
          <p-toggleswitch formControlName="completePipelineStopOnStepError" inputId="completePipelineStopOnStepError"></p-toggleswitch>
        </div>
      </div>

      <div class="col-12 md:col-3 p-2">
        <div class="flex align-items-center justify-content-between border-1 surface-border border-round p-3 h-full gap-3">
          <label for="logIdleCycles" class="text-sm flex-1">
            {{ 'conciliation.settings.logIdleCycles' | translate }}
            <i
              class="pi pi-info-circle text-xs ml-1 text-color-secondary cursor-pointer"
              style="pointer-events: auto"
              [pTooltip]="'conciliation.settings.logIdleCyclesHint' | translate"
              tooltipPosition="top"
            ></i>
          </label>
          <p-toggleswitch formControlName="logIdleCycles" inputId="logIdleCycles"></p-toggleswitch>
        </div>
      </div>

      <div class="col-12 md:col-4 p-2 mt-2">
        <p-floatLabel variant="on" class="w-full">
          <input
            pInputText
            type="text"
            id="completePipelineCron"
            formControlName="completePipelineCron"
            class="w-full p-inputtext-sm"
          />
          <label for="completePipelineCron">
            {{ 'conciliation.settings.completePipelineCron' | translate }}
            <i
              class="pi pi-info-circle text-xs ml-1 text-color-secondary cursor-pointer"
              style="pointer-events: auto"
              [pTooltip]="'conciliation.settings.completePipelineCronHint' | translate"
              tooltipPosition="top"
            ></i>
          </label>
        </p-floatLabel>
      </div>
    </div>

    @if (canEdit()) {
      <div class="mt-4 px-2">
        <p-button
          type="submit"
          icon="pi pi-save"
          [loading]="saving()"
          [label]="'common.save' | translate"
          [disabled]="loading() || form.invalid"
        ></p-button>
      </div>
    }
  </form>
</p-card>

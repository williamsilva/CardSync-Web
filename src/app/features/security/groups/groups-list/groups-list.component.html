<cs-page-header
  [subtitle]="'groups.subtitle' | translate"
  [breadcrumb]="[
    { label: ('breadcrumb.dashboard' | translate), url: '/' },
    { label: ('breadcrumb.groups' | translate) },
  ]"
  [compact]="false"
>
  <button
    pButton
    type="button"
    (click)="refresh()"
    icon="pi pi-refresh"
    class="p-button-text p-button-sm"
    [label]="'common.update' | translate"
  ></button>

  <button
    pButton
    type="button"
    (click)="goNew()"
    icon="pi pi-plus"
    tooltipPosition="top"
    [disabled]="!canCreate()"
    class="p-button-info p-button-sm"
    [label]="'groups.new.title' | translate"
  ></button>
</cs-page-header>

<app-groups-create-dialog
  [group]="group()"
  (saved)="onSaved()"
  [visible]="upsertVisible()"
  (visibleChange)="onUpsertVisibleChange($event)"
></app-groups-create-dialog>

<cs-filters-panel
  [collapsed]="true"
  (clear)="clear()"
  (search)="search()"
  [actionsAlign]="'start'"
  [activeFilters]="activeFilters()"
  [activeCount]="activeFiltersCount()"
  [title]="'common.filter' | translate"
>
  <div class="grid formgrid gap-0 align-items-end">
    <div class="col-12 md:col-4 p-1">
      <p-floatLabel variant="on" class="w-full">
        <input
          id="name"
          pInputText
          [value]="name()"
          class="w-full p-inputtext-sm"
          (input)="name.set(($any($event.target).value ?? '').toString())"
        />
        <label for="name">{{ 'groups.fields.name' | translate }}</label>
      </p-floatLabel>
    </div>

    <div class="col-12 md:col-8 p-1">
      <p-floatLabel variant="on" class="w-full">
        <input
          id="description"
          pInputText
          [value]="description()"
          class="w-full p-inputtext-sm"
          (input)="description.set(($any($event.target).value ?? '').toString())"
        />
        <label for="description">{{ 'groups.fields.description' | translate }}</label>
      </p-floatLabel>
    </div>
  </div>
</cs-filters-panel>

<p-table
  #dt
  stripedRows
  dataKey="id"
  size="small"
  [rows]="rows"
  [lazy]="true"
  showGridlines
  [value]="groups()"
  [rowHover]="true"
  [paginator]="true"
  sortMode="multiple"
  filterDisplay="menu"
  class="p-datatable-sm mt-1"
  styleClass="cs-admin-table"
  [loading]="facade.loading()"
  [showCurrentPageReport]="true"
  [totalRecords]="totalRecords()"
  (onPage)="onPageChange($event)"
  (onLazyLoad)="onLazyLoad($event)"
  [paginatorDropdownAppendTo]="'body'"
  [rowsPerPageOptions]="[10, 20, 50, 100]"
  [tableStyle]="{ width: '100%', 'min-width': '48rem' }"
  [currentPageReportTemplate]="'pagination.report' | translate"
>
  <ng-template pTemplate="colgroup">
    <colgroup>
      <col style="width: auto" />
      <col style="width: auto" />
      <col style="width: 90px" />
    </colgroup>
  </ng-template>

  <ng-template pTemplate="header">
    <tr>
      <th pSortableColumn="name">
        <div class="th-flex text-center">
          <span class="th-label">{{ 'groups.columns.name' | translate }}</span>
          <span class="th-icons">
            <p-sortIcon field="name"></p-sortIcon>
            <p-columnFilter
              field="name"
              type="text"
              display="menu"
              class="ml-auto"
              matchMode="contains"
              [useGrouping]="false"
              [showOperator]="false"
              [showAddButton]="false"
              styleClass="cs-colfilter"
            ></p-columnFilter>
          </span>
        </div>
      </th>

      <th pSortableColumn="description">
        <div class="th-flex text-center">
          <span class="th-label">{{ 'groups.columns.description' | translate }}</span>
          <span class="th-icons">
            <p-sortIcon field="description"></p-sortIcon>
            <p-columnFilter
              type="text"
              display="menu"
              class="ml-auto"
              field="description"
              matchMode="contains"
              [useGrouping]="false"
              [showOperator]="false"
              [showAddButton]="false"
              styleClass="cs-colfilter"
            ></p-columnFilter>
          </span>
        </div>
      </th>

      <th class="text-center">
        <div class="th-flex text-center justify-content-center">
          <span class="th-label">{{ 'common.actions' | translate }}</span>
        </div>
      </th>
    </tr>
  </ng-template>

  <ng-template pTemplate="body" let-row>
    <tr>
      <td>{{ row.name }}</td>
      <td>{{ row.description }}</td>
      <td class="text-center">
        <button
          pButton
          type="button"
          icon="pi pi-eye"
          (click)="view(row)"
          tooltipPosition="top"
          class="p-button-text p-button-sm"
          [pTooltip]="'common.view' | translate"
        ></button>

        <button
          pButton
          type="button"
          icon="pi pi-pencil"
          (click)="edit(row)"
          class="p-button-text p-button-sm"
          [disabled]="!secPolicy.canEdit(row)"
          [pTooltip]="
            secPolicy.canEdit(row)
              ? ('common.edit' | translate)
              : (secPolicy.editDisabledReason(row) ?? 'groups.action.edit.noPermission' | translate)
          "
          tooltipPosition="top"
        ></button>

        <button
          pButton
          type="button"
          icon="pi pi-trash"
          (click)="confirmDelete(row)"
          class="p-button-text p-button-sm"
          [disabled]="!secPolicy.canDelete(row)"
          [pTooltip]="
            secPolicy.canDelete(row)
              ? ('common.delete' | translate)
              : (secPolicy.deleteDisabledReason(row) ?? 'groups.action.delete.noPermission'
                | translate)
          "
          tooltipPosition="top"
        ></button>
      </td>
    </tr>
  </ng-template>

  <ng-template pTemplate="emptymessage">
    <tr>
      <td colspan="3" class="text-center py-5 opacity-70">
        {{ 'groups.empty.title' | translate }}
      </td>
    </tr>
  </ng-template>
</p-table>

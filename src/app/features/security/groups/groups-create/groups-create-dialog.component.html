<p-dialog
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
  [closable]="!saving() && !loadingGroup()"
  [style]="{ width: '42rem', maxWidth: '95vw' }"
  [visible]="visible()"
  (onHide)="onHide()"
  [header]="isEditMode() ? ('groups.edit.title' | translate) : ('groups.new.title' | translate)"
>
  <form [formGroup]="form" class="cs-dialog-form">
    <div class="grid formgrid gap-0">
      <div class="col-12 p-2">
        <p-floatLabel variant="on" class="w-full">
          <input
            id="name"
            pInputText
            type="text"
            formControlName="name"
            class="w-full p-inputtext-sm"
          />
          <app-error-msg
            [field]="'name'"
            [forId]="'name'"
            [showTechnicalDetails]="true"
            [control]="form.controls.name"
            [label]="'groups.fields.name' | translate"
          />
        </p-floatLabel>
      </div>

      <div class="col-12 p-2">
        <p-floatLabel variant="on" class="w-full">
          <input
            id="description"
            pInputText
            type="text"
            formControlName="description"
            class="w-full p-inputtext-sm"
          />
          <app-error-msg
            [field]="'description'"
            [forId]="'description'"
            [showTechnicalDetails]="true"
            [control]="form.controls.description"
            [label]="'groups.fields.description' | translate"
          />
        </p-floatLabel>
      </div>
    </div>
  </form>

  <ng-template pTemplate="footer">
    <button
      pButton
      type="button"
      (click)="close()"
      icon="pi pi-times"
      class="p-button-text p-button-sm"
      [label]="'common.cancel' | translate"
      [disabled]="saving() || loadingGroup()"
    ></button>

    <button
      pButton
      type="button"
      (click)="save()"
      icon="pi pi-save"
      class="p-button-sm"
      [loading]="saving()"
      [label]="'common.save' | translate"
      [disabled]="saving() || loadingGroup() || !canSubmit()"
    ></button>
  </ng-template>
</p-dialog>
